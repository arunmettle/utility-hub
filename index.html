<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Cobalt | Privacy-first browser tools for developers</title>
    <meta name="title" content="Cobalt | Privacy-first browser tools for developers" />
    <meta
      name="description"
      content="Cobalt is a privacy-first collection of browser-based developer tools for formatting, encoding, testing, reviewing diffs, and inspecting delivery workflows without server round-trips."
    />
    <meta
      name="keywords"
      content="privacy-first developer tools, browser utilities, json formatter, regex tester, diff checker, docker tools, openapi tools"
    />
    <meta name="author" content="Cobalt" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://utility-hub.vercel.app/" />
    <meta property="og:title" content="Cobalt | Privacy-first browser tools for developers" />
    <meta property="og:description" content="Browser-based utilities for formatting, review, encoding, delivery checks, and local developer workflows." />
    <meta property="og:image" content="https://utility-hub.vercel.app/og-image.svg" />
    <meta property="og:image:alt" content="Cobalt preview card with privacy-first browser tools branding and developer workflow categories." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://utility-hub.vercel.app/" />
    <meta property="twitter:title" content="Cobalt | Privacy-first browser tools for developers" />
    <meta property="twitter:description" content="Browser-based utilities for formatting, review, encoding, delivery checks, and local developer workflows." />
    <meta property="twitter:image" content="https://utility-hub.vercel.app/og-image.svg" />
    <meta property="twitter:image:alt" content="Cobalt preview card with privacy-first browser tools branding and developer workflow categories." />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
